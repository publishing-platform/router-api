default: &default
  adapter: postgresql
  encoding: unicode
  pool: 12

development:
  <<: *default
  database: router_api_development
  url: <%= ENV["DATABASE_URL"]%>

test:
  <<: *default
  database: router_api_test
  url: <%= ENV["TEST_DATABASE_URL"] %>

production:
  <<: *default
  database: router_api
  url: <%= ENV["DATABASE_URL"]%>
